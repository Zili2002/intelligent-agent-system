name: CI

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Lint check
        run: npm run lint

      - name: Docker sandbox integration
        run: npm run test:docker --workspace autonomous-agent

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: intelligent-agent-system:ci
